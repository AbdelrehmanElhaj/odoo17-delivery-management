services:
  db:
    image: postgres:15
    container_name: dms-db
    environment:
      - POSTGRES_USER=odoo17
      - POSTGRES_PASSWORD=odoo17
      - POSTGRES_DB=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - dms-db-data:/var/lib/postgresql/data/pgdata
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo17"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  web:
    build: .
    image: odoo17-delivery:latest
    container_name: dms-odoo
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8069"
    environment:
      - HOST=db
      - USER=odoo17
      - PASSWORD=odoo17
      # nginx-proxy routing
      - VIRTUAL_HOST=dms.hdrelhaj.com
      - VIRTUAL_PORT=8069
      # Let's Encrypt
      - LETSENCRYPT_HOST=dms.hdrelhaj.com
      - LETSENCRYPT_EMAIL=a.elhaj@proptech.sa
    volumes:
      - dms-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - ./logs:/var/log/odoo
    restart: unless-stopped
    networks:
      - internal
      - web

  traccar:
    image: traccar/traccar:latest
    container_name: dms-traccar
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - dms-traccar-data:/opt/traccar/data
      - ./traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
    ports:
      - "5055:5055"   # Traccar Client / OsmAnd device protocol (HTTP)
    expose:
      - "8082"        # Web UI — served via nginx-proxy at traccar.hdrelhaj.com
    environment:
      - VIRTUAL_HOST=traccar.hdrelhaj.com
      - VIRTUAL_PORT=8082
      - LETSENCRYPT_HOST=traccar.hdrelhaj.com
      - LETSENCRYPT_EMAIL=a.elhaj@proptech.sa
    networks:
      - internal
      - web

  traccar-bridge:
    build: ./traccar-bridge
    container_name: dms-traccar-bridge
    restart: unless-stopped
    environment:
      - ODOO_URL=http://web:8069
      - ODOO_DB=DeliveryDemo
      - ODOO_USER=admin
      - ODOO_PASS=admin
      - WEBHOOK_SECRET=change-me-in-production
      # nginx-proxy routing (optional — expose bridge publicly for OsmAnd direct mode)
      - VIRTUAL_HOST=gps.hdrelhaj.com
      - VIRTUAL_PORT=8000
      - LETSENCRYPT_HOST=gps.hdrelhaj.com
      - LETSENCRYPT_EMAIL=a.elhaj@proptech.sa
    expose:
      - "8000"
    depends_on:
      - web
      - traccar
    networks:
      - internal
      - web

volumes:
  dms-web-data:
    driver: local
  dms-db-data:
    driver: local
  dms-traccar-data:
    driver: local

networks:
  internal:
    driver: bridge
  web:
    external: true

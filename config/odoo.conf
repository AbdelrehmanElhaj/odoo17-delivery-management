[options]
; ── Security ──────────────────────────────────────────────────────────
admin_passwd = admin@123
list_db       = False
dbfilter      = ^DeliveryDemo$

; ── Database ──────────────────────────────────────────────────────────
db_host     = db
db_port     = 5432
db_user     = odoo17
db_password = odoo17

; ── Paths ─────────────────────────────────────────────────────────────
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir    = /var/lib/odoo

; ── Logging ───────────────────────────────────────────────────────────
logfile   = /var/log/odoo/odoo.log
log_level = info
; Silence noisy addons — keep construction_management at INFO
log_handler = :WARNING,odoo.addons.delivery_management:INFO

; ── Workers (single-process — safe for 2GB RAM, no swap) ─────────────
workers          = 0
max_cron_threads = 1

; ── Request timeouts ─────────────────────────────────────────────────
; PDF reports and Excel imports can be slow — raise limits accordingly
limit_time_cpu  = 600
limit_time_real = 1200

; ── Network ───────────────────────────────────────────────────────────
proxy_mode = True

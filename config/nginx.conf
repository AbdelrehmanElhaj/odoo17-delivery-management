# Use Docker's internal DNS resolver so nginx doesn't fail at startup if
# the upstream container isn't ready yet (resolves names dynamically).
resolver 127.0.0.11 valid=30s ipv6=off;

# HTTP — serve ACME challenge, redirect everything else to HTTPS
server {
    listen 80;
    server_name csm.hdrelhaj.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name csm.hdrelhaj.com;

    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-Frame-Options           SAMEORIGIN                             always;

    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;

    client_max_body_size 512m;

    access_log /var/log/nginx/odoo_access.log;
    error_log  /var/log/nginx/odoo_error.log;

    location /websocket {
        set $odoo_upstream http://web:8069;
        proxy_pass         $odoo_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location ~* /web/static/ {
        set $odoo_upstream http://web:8069;
        proxy_pass      $odoo_upstream;
        proxy_buffering on;
        expires         24h;
        add_header      Cache-Control "public, immutable";
    }

    location / {
        set $odoo_upstream http://web:8069;
        proxy_pass      $odoo_upstream;
        proxy_redirect  off;
        proxy_buffering off;
    }

    gzip            on;
    gzip_types      text/plain text/xml text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1400;
}
